<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDo List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>ToDo List</h1>

    <div class="input-box">
      <input type="text" id="todoInput" placeholder="할 일을 입력하세요">
      <button id="addBtn">할 일 추가</button>
    </div>

    <div class="list-wrap">
      <div class="list-box">
        <h2>할 일 목록</h2>
        <ul id="todoList"></ul>
      </div>

      <div class="list-box">
        <h2>완료 목록</h2>
        <ul id="doneList"></ul>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
